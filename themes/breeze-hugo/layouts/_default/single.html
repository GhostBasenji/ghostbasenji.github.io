{{ define "main" }}
<div class="shell">
  {{ partial "sidebar.html" . }}
  <div class="main-content">
    <div class="page">
      <header class="page-header" style="border-bottom: 1px solid color-mix(in oklch, var(--border) 50%, transparent); padding-bottom: 2.5rem;">
        <h2 class="page-title">{{ .Title }}</h2>
        {{ with .Params.description }}
        <p class="page-description">{{ . }}</p>
        {{ end }}
      </header>
      <div class="prose" style="margin-top: 2rem;">{{ .Content }}</div>

      {{ partial "comments.html" . }}
    </div>
  </div>
</div>
{{ end }}
