{{ define "main" }}
<div class="shell">
  {{ partial "sidebar.html" . }}
  <div class="main-content">
    <div class="page">
      <header class="page-header">
        <h2 class="page-title">{{ .Title }}</h2>
      </header>
      <div>
        {{ range .Pages.ByDate.Reverse }}
          {{ partial "post-preview.html" . }}
        {{ end }}
      </div>
    </div>
  </div>
</div>
{{ end }}
